    recipients: finance@company.com, laura@company.com
    body: 'Hi Laura,


      Thanks for the request. Frankly, with our current burn and the ongoing hiring freeze, I don''t think
      we can approve additional budget for headcount at this time. Please push non-critical hires to next
      quarter and explore contractor options.


      Best,

      Daniel'
