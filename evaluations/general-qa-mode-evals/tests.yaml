- vars:
    subject: 'Fwd: Technical Design Notes — API Gateway and POC'
    recipients: product@company.com, design@company.com, eng@company.com
    body: 'Forwarding the design notes from the tech sync. Highlights:

      - We propose an API gateway in front of microservices to handle rate limiting and auth.

      - POC will validate the async event model and the scaling approach.

      - MVP excludes cross-tenant data sync; that''s a stretch goal.


      Please review and flag anything that needs clarification for non-engineering stakeholders.'
    thread_context: '[2026-03-30] Ahmed (Engineering): The plan is to build a lightweight API gateway
      (NGINX + Lua) to enforce ACLs and rate limiting. We''ll run a POC to test event-driven processing
      and autoscaling with Kafka and K8s. The MVP will ship without cross-tenant data sync; adding that
      requires addressing data partitioning and schema migration. Tech debt items: auth token rotation,
      API versioning.

      [2026-03-30] Priya (Product): Can someone explain POC, MVP, and what "API gateway" implies for roadmap
      and cost?'
    instruction: Explain the technical jargon used in this thread (POC, MVP, API gateway, cross-tenant
      data sync) concisely for a non-engineer stakeholder.
