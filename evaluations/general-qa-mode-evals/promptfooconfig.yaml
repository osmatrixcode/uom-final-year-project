# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

# Learn more about building a configuration: https://promptfoo.dev/docs/configuration/guide

description: "General QA Evaluation"

prompts:
  - file://prompts/ext-prompt.txt
  - file://prompts/basic-prompt.txt
  - file://prompts/few-shot-prompt.txt
  - file://prompts/cot-prompt.txt


providers:
  - "openai:gpt-5"

# Applied to every test case unless the case overrides it.
# Useful because `promptfoo generate dataset` produces vars without assertions.
defaultTest:
  assert:
    - type: llm-rubric
      value: >-
        The response is on-topic for the email thread and either (a) answers
        the user's instruction directly using facts from the email/thread, or
        (b) politely declines if the instruction is unrelated to email. It
        does not fabricate details not present in the thread.

tests: file://tests.yaml
