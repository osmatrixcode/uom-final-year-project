# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

# Learn more about building a configuration: https://promptfoo.dev/docs/configuration/guide

description: "General QA Evaluation"

prompts:
  - file://prompts/ext-prompt.txt

providers:
  - "openai:gpt-5"

tests:
  # Test Case 1: summarisation
  - vars:
      subject: "Project Phoenix Sync"
      recipients: "sarah@company.com, mark@company.com"
      body: "Sarah: We need to move the deadline to Friday. Mark: That works for me."
      thread_context: ""
      instruction: "What was the final decision on the deadline?"
    assert:
      - type: icontains
        value: "Friday"

  # Test Case: Complex thread context
  - vars:
      subject: "Re: Urgent: Server Down"
      recipients: "dev-ops@company.com"
      body: "The database is back up but running slow."
      thread_context: "Earlier today the main server crashed due to a memory leak."
      instruction: "Summarize the history of this issue."
    assert:
      - type: llm-rubric
        value: "The response accurately mentions both the crash and the current slow status."
