description: generate reply Evaluation
prompts:
  - file://prompts/simple-prompt.txt
  - file://prompts/ext-prompt.txt
  - file://prompts/few-shot-prompt.txt
  - file://prompts/cot-prompt.txt
providers:
  - openai:gpt-5
  - anthropic:messages:claude-sonnet-4-6
  - google:gemini-2.5-pro
defaultTest:
  options:
    provider: openai:gpt-5-mini
  assert:
    - type: llm-rubric
      value: >-
        Score the generated email on a scale of 0.0 to 1.0 based on the
        following criteria:

        1. Instruction Precision (40% weight): Did it fulfill every specific
        task in the {{instruction_note}}? (e.g., specific times, caveats, or
        actions). 2. Persona & Tone Mastery (30% weight): Does the "voice"
        perfectly match the priority Thread Note in the {{thread_context}}? For
        example, if it's "witty/informal," is it actually playful, or just
        generic? If it's "executive," is it appropriately crisp? 3. Contextual
        Intelligence (20% weight): Does the reply make sense given the {{body}}
        and {{thread_context}}? It should feel like a natural continuation of
        the conversation. 4. Formatting (10% weight): Subtract points if the
        model included headers (Subject/To/From) or if the sign-off doesn't
        match {{sender_name}}.

        A 1.0 is a "perfect" email that could be sent without any editing. A 0.5
        is helpful but missed a key instruction or got the tone wrong. A 0.0 is
        completely incorrect, halluncinated, or included headers.
